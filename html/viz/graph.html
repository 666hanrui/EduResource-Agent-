<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>图算法可视化</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--y:#FFE01B;--ink:#241C15;--ink2:#1a1614;--accent:#4a9eff;--green:#2d8a5e;--red:#ff4d74;--orange:#f5a623;--font:"Inter Tight",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--ink2);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.title{font-size:14px;font-weight:800;letter-spacing:-.03em}
.algo-tabs{display:flex;gap:6px}
.algo-tab{padding:5px 13px;border:1.5px solid rgba(255,255,255,.15);border-radius:999px;background:transparent;color:rgba(255,255,255,.5);font:700 11px var(--font);cursor:pointer;transition:all .15s}
.algo-tab:hover{border-color:rgba(255,255,255,.35);color:#fff}
.algo-tab.active{border-color:var(--y);background:var(--y);color:var(--ink)}
.controls{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:6px 14px;border:1.5px solid rgba(255,255,255,.18);border-radius:999px;background:transparent;color:#fff;font:700 11px var(--font);cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.1)}
.btn.primary{border-color:var(--y);background:var(--y);color:var(--ink)}
input[type=range]{width:70px;accent-color:var(--y)}
.speed-label{font:600 10px var(--mono);color:rgba(255,255,255,.35)}
.status-bar{display:flex;align-items:center;gap:14px;padding:7px 16px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;font:600 11px var(--mono)}
.stat{color:rgba(255,255,255,.35)}.stat span{color:var(--y)}
.stage{flex:1;display:flex;gap:0;overflow:hidden}
canvas{flex:1;height:100%;cursor:pointer}
.side-panel{width:200px;border-left:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;font:11px var(--mono)}
.side-head{padding:10px 12px;font:700 10px var(--mono);color:rgba(255,255,255,.3);border-bottom:1px solid rgba(255,255,255,.06);text-transform:uppercase;letter-spacing:.06em}
.side-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.dist-row{display:flex;justify-content:space-between;padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.dist-row.active{border-color:var(--y);color:var(--y);background:rgba(255,224,27,.07)}
.dist-row.visited{border-color:rgba(45,138,94,.4);color:#2d8a5e}
.hint{padding:10px 12px;font:600 10px var(--mono);color:rgba(255,255,255,.2);border-top:1px solid rgba(255,255,255,.06);line-height:1.6}
</style>
<style>
:root{--paper:#f2efe8;--paper-soft:#e8e4d9;--ink:#161513;--ink-soft:#3a3631;--ink-mute:#8a857d;--rule:rgba(22,21,19,.18);--display:"Instrument Serif","Times New Roman",serif;--font:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--y:#161513;--ink2:#f2efe8;--accent:#8a857d;--green:#4f6f52;--red:#9f1239;--orange:#6f614b}
body{background:var(--paper);color:var(--ink);font-weight:300;-webkit-font-smoothing:antialiased}
.topbar{min-height:62px;padding:0 18px;background:var(--paper);border-bottom:1px solid var(--rule);gap:10px;flex-wrap:wrap}
.title{font-family:var(--display);font-size:25px;font-weight:400;letter-spacing:0;color:var(--ink);white-space:nowrap}
.algo-tabs,.controls{gap:0}
.algo-tab,.btn{min-height:34px;padding:0 12px;border:1px solid var(--rule);border-radius:0;background:transparent;color:var(--ink-mute);font:500 10px var(--font);letter-spacing:.16em;text-transform:uppercase;box-shadow:none}
.algo-tab+.algo-tab,.btn+.btn{border-left:0}
.algo-tab:hover,.btn:hover,.algo-tab.active,.btn.primary,.btn.primary:hover{border-color:var(--ink);background:var(--ink);color:var(--paper);transform:none}
.controls{margin-left:auto}
.speed-label,.stat,.side-head,.hint{font:500 10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
input[type=range]{accent-color:var(--ink)}
.status-bar{min-height:36px;padding:0 18px;background:var(--paper-soft);border-bottom:1px solid var(--rule);flex-wrap:wrap}
.stat span{color:var(--ink)}
.stage{background:var(--paper)}
canvas{background:#f8f4eb}
.side-panel{border-left:1px solid var(--rule);background:var(--paper-soft);color:var(--ink)}
.side-head,.hint{border-color:var(--rule)}
.dist-row{border:1px solid var(--rule);border-radius:0;color:var(--ink-mute);background:transparent}
.dist-row.active{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.dist-row.visited{border-color:rgba(79,111,82,.5);color:#4f6f52}
</style>
</head>
<body>
<div class="topbar">
  <span class="title">图算法可视化</span>
  <div class="algo-tabs">
    <button class="algo-tab active" onclick="setAlgo('bfs')">BFS 广搜</button>
    <button class="algo-tab" onclick="setAlgo('dfs')">DFS 深搜</button>
    <button class="algo-tab" onclick="setAlgo('dijkstra')">Dijkstra 最短路</button>
  </div>
  <div class="controls">
    <span class="speed-label">速度</span>
    <input type="range" id="speed" min="1" max="10" value="5"/>
    <button class="btn" onclick="resetGraph()">重置图</button>
    <button class="btn primary" onclick="togglePlay()" id="play-btn">▶ 播放</button>
  </div>
</div>
<div class="status-bar">
  <span class="stat">算法 <span id="s-algo">BFS</span></span>
  <span class="stat">起点 <span id="s-src">A</span></span>
  <span class="stat">步骤 <span id="s-step">0</span> / <span id="s-total">0</span></span>
  <span class="stat">队列/栈 <span id="s-queue">[]</span></span>
</div>
<div class="stage">
  <canvas id="c"></canvas>
  <div class="side-panel">
    <div class="side-head" id="side-title">访问顺序</div>
    <div class="side-body" id="side-body"></div>
    <div class="hint">点击节点设置起点<br/>播放观察遍历过程</div>
  </div>
</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');

// ─── Graph Data ───
const NODES = {
  A:{label:'A', x:0.5,  y:0.12},
  B:{label:'B', x:0.2,  y:0.35},
  C:{label:'C', x:0.8,  y:0.35},
  D:{label:'D', x:0.12, y:0.65},
  E:{label:'E', x:0.38, y:0.65},
  F:{label:'F', x:0.62, y:0.65},
  G:{label:'G', x:0.88, y:0.65},
  H:{label:'H', x:0.25, y:0.88},
  I:{label:'I', x:0.75, y:0.88},
};
const EDGES = [
  ['A','B',4], ['A','C',2],
  ['B','D',5], ['B','E',3],
  ['C','F',6], ['C','G',1],
  ['D','H',2], ['E','H',4], ['E','F',2],
  ['F','I',3], ['G','I',5],
];

const adj = {};
Object.keys(NODES).forEach(k => { adj[k] = []; });
EDGES.forEach(([u,v,w]) => {
  adj[u].push({to:v,w});
  adj[v].push({to:u,w});
});

let algo = 'bfs';
let srcNode = 'A';
let steps = [], stepIdx = 0;
let playing = false, timer = null;

// Node state colors: unvisited|active|visited|queued
let nodeState = {};
let edgeState = {}; // "u-v" → active|visited

function edgeKey(u,v) { return [u,v].sort().join('-'); }

// ─── Algorithms ───
function buildSteps() {
  steps = [];
  const visited = new Set();
  const edgeUsed = {};

  if (algo === 'bfs') {
    const queue = [srcNode];
    const dist = {[srcNode]:0};
    visited.add(srcNode);
    while (queue.length) {
      const u = queue.shift();
      const ns = {}; const es = {};
      Object.keys(NODES).forEach(k => ns[k]='unvisited');
      visited.forEach(k => ns[k]='visited'); ns[u]='active';
      Object.keys(edgeUsed).forEach(k => es[k]='visited'); 
      steps.push({nodes:{...ns}, edges:{...es}, queue:[...queue], active:u, dist:{...dist}});
      adj[u].forEach(({to,w}) => {
        if (!visited.has(to)) {
          visited.add(to); queue.push(to);
          dist[to]=(dist[u]||0)+w;
          edgeUsed[edgeKey(u,to)]='visited';
        }
      });
    }
  } else if (algo === 'dfs') {
    const stack = [srcNode];
    const seen = new Set();
    while (stack.length) {
      const u = stack[stack.length-1];
      const ns = {}; const es = {};
      Object.keys(NODES).forEach(k => ns[k]='unvisited');
      seen.forEach(k => ns[k]='visited'); ns[u]='active';
      Object.keys(edgeUsed).forEach(k => es[k]='visited');
      steps.push({nodes:{...ns}, edges:{...es}, queue:[...stack], active:u});
      seen.add(u);
      const neighbors = adj[u].filter(({to})=>!seen.has(to));
      if (neighbors.length) {
        const {to} = neighbors[0];
        edgeUsed[edgeKey(u,to)]='visited';
        stack.push(to);
      } else { stack.pop(); }
    }
  } else if (algo === 'dijkstra') {
    const INF = 1e9;
    const dist = {};
    Object.keys(NODES).forEach(k => dist[k]=INF);
    dist[srcNode]=0;
    const pq = [[0,srcNode]]; // [dist, node]
    const settled = new Set();
    while (pq.length) {
      pq.sort((a,b)=>a[0]-b[0]);
      const [d,u] = pq.shift();
      if (settled.has(u)) continue;
      settled.add(u);
      const ns = {}; const es = {};
      Object.keys(NODES).forEach(k => ns[k] = settled.has(k)?'visited':'unvisited');
      ns[u]='active';
      Object.keys(edgeUsed).forEach(k=>es[k]='visited');
      steps.push({nodes:{...ns},edges:{...es},queue:pq.map(x=>x[1]),active:u,dist:{...dist}});
      adj[u].forEach(({to,w})=>{
        if (!settled.has(to) && dist[u]+w < dist[to]) {
          dist[to]=dist[u]+w;
          edgeUsed[edgeKey(u,to)]='visited';
          pq.push([dist[to],to]);
        }
      });
    }
  }
  document.getElementById('s-total').textContent = steps.length;
  renderSidePanel();
}

function renderSidePanel() {
  const el = document.getElementById('side-body');
  const title = document.getElementById('side-title');
  if (algo==='dijkstra') {
    title.textContent='最短距离';
    el.innerHTML = Object.keys(NODES).map(k=>`
      <div class="dist-row" id="dr-${k}">
        <span>${k}</span><span>∞</span>
      </div>`).join('');
  } else {
    title.textContent='访问顺序';
    el.innerHTML = Object.keys(NODES).map(k=>`
      <div class="dist-row" id="dr-${k}">
        <span>${k}</span><span>-</span>
      </div>`).join('');
  }
}

function updateSidePanel(step) {
  if (!step) return;
  document.getElementById('s-step').textContent = stepIdx;
  document.getElementById('s-queue').textContent = '['+step.queue.join(',')+']';
  document.getElementById('s-src').textContent = srcNode;
  Object.keys(NODES).forEach(k => {
    const el = document.getElementById('dr-'+k);
    if (!el) return;
    el.classList.toggle('active', k===step.active);
    el.classList.toggle('visited', step.nodes[k]==='visited'&&k!==step.active);
    if (step.dist) {
      const v = step.dist[k];
      el.querySelector('span:last-child').textContent = v>=1e9?'∞':v;
    }
  });
}

// ─── Draw ───
function resizeCanvas() {
  C.width = C.offsetWidth * devicePixelRatio;
  C.height = C.offsetHeight * devicePixelRatio;
  draw();
}

const NODE_R = 22;
const COLORS = {
  unvisited:'#8a857d', active:'#161513', visited:'#4f6f52', queued:'#6f614b'
};

function getPos(key) {
  const n = NODES[key];
  const dpr = devicePixelRatio;
  return { x: n.x * C.offsetWidth * dpr, y: n.y * C.offsetHeight * dpr };
}

function draw(cur={}) {
  const dpr = devicePixelRatio;
  ctx.clearRect(0, 0, C.width, C.height);

  const ns = cur.nodes || {};
  const es = cur.edges || {};

  // Edges
  EDGES.forEach(([u,v,w]) => {
    const pu = getPos(u), pv = getPos(v);
    const key = edgeKey(u,v);
    const active = es[key]==='visited';
    ctx.strokeStyle = active ? '#4f6f52' : 'rgba(22,21,19,0.16)';
    ctx.lineWidth = active ? 2.5*dpr : 1.5*dpr;
    ctx.beginPath();
    ctx.moveTo(pu.x, pu.y);
    ctx.lineTo(pv.x, pv.y);
    ctx.stroke();
    // Weight label
    const mx = (pu.x+pv.x)/2, my = (pu.y+pv.y)/2;
    ctx.fillStyle = active ? 'rgba(79,111,82,.9)' : 'rgba(22,21,19,.42)';
    ctx.font = `${9*dpr}px "Space Grotesk",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(w), mx, my-6*dpr);
  });

  // Nodes
  Object.keys(NODES).forEach(k => {
    const p = getPos(k);
    const state = ns[k] || 'unvisited';
    const color = COLORS[state] || COLORS.unvisited;
    const r = NODE_R * dpr;

    ctx.shadowColor = color;
    ctx.shadowBlur = state==='active' ? 18*dpr : state==='visited' ? 8*dpr : 0;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(22,21,19,0.24)';
    ctx.lineWidth = 1.5*dpr;
    ctx.stroke();

    ctx.fillStyle = '#f8f4eb';
    ctx.font = `bold ${12*dpr}px "Space Grotesk",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(k, p.x, p.y);

    // Src label
    if (k===srcNode) {
      ctx.fillStyle='rgba(22,21,19,.52)';
      ctx.font=`${9*dpr}px var(--mono)`;
      ctx.fillText('起点', p.x, p.y-NODE_R*dpr-8*dpr);
    }
  });
}

// Click to set source
C.addEventListener('click', e => {
  const rect = C.getBoundingClientRect();
  const cx = (e.clientX-rect.left)*devicePixelRatio;
  const cy = (e.clientY-rect.top)*devicePixelRatio;
  let found = null;
  Object.keys(NODES).forEach(k => {
    const p = getPos(k);
    const dx=p.x-cx, dy=p.y-cy;
    if (Math.sqrt(dx*dx+dy*dy)<NODE_R*devicePixelRatio*1.3) found=k;
  });
  if (found) {
    srcNode=found;
    stopPlay();
    stepIdx=0;
    buildSteps();
    draw();
  }
});

function setAlgo(a) {
  algo=a;
  document.querySelectorAll('.algo-tab').forEach(b=>{
    const map={bfs:'BFS 广搜',dfs:'DFS 深搜',dijkstra:'Dijkstra 最短路'};
    b.classList.toggle('active',b.textContent.trim()===map[a]);
  });
  document.getElementById('s-algo').textContent=a.toUpperCase();
  stopPlay(); stepIdx=0;
  buildSteps(); draw();
}

function resetGraph() { stopPlay(); stepIdx=0; buildSteps(); draw(); }

function getDelay() { return Math.max(80, 1000-parseInt(document.getElementById('speed').value)*90); }

function stepForward() {
  if (stepIdx>=steps.length) return false;
  const s = steps[stepIdx];
  draw(s);
  updateSidePanel(s);
  stepIdx++;
  return true;
}

function togglePlay() {
  if (playing){stopPlay();return;}
  if (stepIdx>=steps.length){stepIdx=0;}
  playing=true;
  document.getElementById('play-btn').textContent='⏸ 暂停';
  function tick(){if(!playing)return;if(!stepForward()){stopPlay();return;}timer=setTimeout(tick,getDelay());}
  tick();
}

function stopPlay(){playing=false;clearTimeout(timer);document.getElementById('play-btn').textContent='▶ 播放';}

window.addEventListener('resize', resizeCanvas);
setTimeout(()=>{resizeCanvas();buildSteps();},50);
</script>
</body>
</html>
