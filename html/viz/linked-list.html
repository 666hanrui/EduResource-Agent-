<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>链表可视化</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--y:#FFE01B;--ink:#241C15;--ink2:#1a1614;--accent:#4a9eff;--green:#2d8a5e;--red:#ff4d74;--font:"Inter Tight",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--ink2);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.title{font-size:14px;font-weight:800;letter-spacing:-.03em}
.op-tabs{display:flex;gap:6px}
.op-tab{padding:5px 13px;border:1.5px solid rgba(255,255,255,.15);border-radius:999px;background:transparent;color:rgba(255,255,255,.5);font:700 11px var(--font);cursor:pointer;transition:all .15s}
.op-tab:hover{border-color:rgba(255,255,255,.35);color:#fff}
.op-tab.active{border-color:var(--y);background:var(--y);color:var(--ink)}
.controls{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:6px 14px;border:1.5px solid rgba(255,255,255,.18);border-radius:999px;background:transparent;color:#fff;font:700 11px var(--font);cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.1)}
.btn.primary{border-color:var(--y);background:var(--y);color:var(--ink)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(255,77,116,.15)}
input.val-input{width:56px;padding:5px 10px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.05);color:#fff;font:700 13px var(--mono);text-align:center;outline:none}
input.val-input:focus{border-color:var(--y)}
label.ctrl-label{font:600 10px var(--mono);color:rgba(255,255,255,.35)}
.status-bar{display:flex;align-items:center;gap:14px;padding:7px 16px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;font:600 11px var(--mono)}
.stat{color:rgba(255,255,255,.35)}.stat span{color:var(--y)}
.stage{flex:1;display:flex;flex-direction:column;overflow:hidden}
canvas{flex:1;width:100%}
.log-strip{height:80px;overflow-y:auto;border-top:1px solid rgba(255,255,255,.06);padding:8px 16px;background:rgba(0,0,0,.3);display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.log-line{font:500 10px var(--mono);color:rgba(255,255,255,.45);line-height:1.6}
.log-line.hi{color:var(--y)}
</style>
<style>
:root{--paper:#f2efe8;--paper-soft:#e8e4d9;--ink:#161513;--ink-soft:#3a3631;--ink-mute:#8a857d;--rule:rgba(22,21,19,.18);--display:"Instrument Serif","Times New Roman",serif;--font:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--y:#161513;--ink2:#f2efe8;--accent:#8a857d;--green:#4f6f52;--red:#9f1239}
body{background:var(--paper);color:var(--ink);font-weight:300;-webkit-font-smoothing:antialiased}
.topbar{min-height:62px;padding:0 18px;background:var(--paper);border-bottom:1px solid var(--rule);gap:10px;flex-wrap:wrap}
.title{font-family:var(--display);font-size:25px;font-weight:400;letter-spacing:0;color:var(--ink);white-space:nowrap}
.op-tabs,.controls{gap:0}
.op-tab,.btn{min-height:34px;padding:0 12px;border:1px solid var(--rule);border-radius:0;background:transparent;color:var(--ink-mute);font:500 10px var(--font);letter-spacing:.16em;text-transform:uppercase;box-shadow:none}
.op-tab+.op-tab,.btn+.btn{border-left:0}
.op-tab:hover,.btn:hover,.op-tab.active,.btn.primary,.btn.primary:hover,.btn.danger:hover{border-color:var(--ink);background:var(--ink);color:var(--paper);transform:none}
.btn.danger{border-color:var(--rule);color:var(--ink)}
.controls{margin-left:auto}
label.ctrl-label,.stat,.log-line{font:500 10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
input.val-input{border:1px solid var(--rule);border-radius:0;background:var(--paper-soft);color:var(--ink);font-family:var(--mono)}
input.val-input:focus{border-color:var(--ink)}
.status-bar{min-height:36px;padding:0 18px;background:var(--paper-soft);border-bottom:1px solid var(--rule);flex-wrap:wrap}
.stat span,.log-line.hi{color:var(--ink)}
.stage{background:var(--paper)}
canvas{background:#f8f4eb}
.log-strip{height:88px;border-top:1px solid var(--rule);background:var(--paper-soft)}
</style>
</head>
<body>
<div class="topbar">
  <span class="title">链表可视化</span>
  <div class="op-tabs">
    <button class="op-tab active" onclick="setOp('append')">追加</button>
    <button class="op-tab" onclick="setOp('prepend')">头插</button>
    <button class="op-tab" onclick="setOp('insert')">插入</button>
    <button class="op-tab" onclick="setOp('delete')">删除</button>
    <button class="op-tab" onclick="setOp('search')">查找</button>
    <button class="op-tab" onclick="setOp('reverse')">反转</button>
  </div>
  <div class="controls">
    <label class="ctrl-label">值</label>
    <input class="val-input" id="val-input" type="number" value="42" min="1" max="99"/>
    <label class="ctrl-label">位置</label>
    <input class="val-input" id="pos-input" type="number" value="2" min="0" max="20" style="width:48px"/>
    <button class="btn primary" onclick="doOp()" id="op-btn">▶ 追加</button>
    <button class="btn" onclick="resetList()">重置</button>
    <button class="btn" onclick="stepBack()">← 撤销</button>
  </div>
</div>
<div class="status-bar">
  <span class="stat">长度 <span id="s-len">6</span></span>
  <span class="stat">操作 <span id="s-op">append</span></span>
  <span class="stat">时间复杂度 <span id="s-tc">O(1)</span></span>
  <span class="stat">步骤 <span id="s-step">-</span></span>
</div>
<div class="stage">
  <canvas id="c"></canvas>
  <div class="log-strip" id="log"></div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');

// ─── Data ───
let nodes = [10, 23, 5, 87, 42, 61]; // values
let highlighted = new Set();   // indices flashing
let phaseNodes = {};           // index→color override
let arrowPhase = null;         // {from, to, color} animated arrow

let currentOp = 'append';
const OP_TC = { append:'O(1)', prepend:'O(1)', insert:'O(n)', delete:'O(n)', search:'O(n)', reverse:'O(n)' };
const OP_NAMES = { append:'追加', prepend:'头插', insert:'插入', delete:'删除', search:'查找', reverse:'反转' };

let history = [];

function log(msg, hi=false) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line' + (hi?' hi':'');
  line.textContent = '› ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-tab').forEach(b => b.classList.toggle('active', b.textContent.trim() === OP_NAMES[op]));
  document.getElementById('s-op').textContent = op;
  document.getElementById('s-tc').textContent = OP_TC[op];
  document.getElementById('op-btn').textContent = '▶ ' + OP_NAMES[op];
  phaseNodes = {}; highlighted = new Set(); arrowPhase = null;
  draw();
}

function resetList() {
  nodes = [10, 23, 5, 87, 42, 61];
  phaseNodes = {}; highlighted = new Set(); arrowPhase = null;
  history = [];
  updateLen();
  document.getElementById('log').innerHTML = '';
  log('链表已重置');
  draw();
}

function stepBack() {
  if (history.length > 0) {
    nodes = history.pop();
    phaseNodes = {}; highlighted = new Set();
    updateLen();
    log('撤销操作');
    draw();
  }
}

function updateLen() {
  document.getElementById('s-len').textContent = nodes.length;
}

function doOp() {
  const val = parseInt(document.getElementById('val-input').value) || 0;
  const pos = parseInt(document.getElementById('pos-input').value) || 0;
  history.push([...nodes]);

  const clampedPos = Math.max(0, Math.min(pos, nodes.length));

  phaseNodes = {}; highlighted = new Set();

  if (currentOp === 'append') {
    nodes.push(val);
    const idx = nodes.length - 1;
    phaseNodes[idx] = 'new';
    log(`append(${val}) → 追加到末尾 [idx=${idx}]`, true);

  } else if (currentOp === 'prepend') {
    nodes.unshift(val);
    phaseNodes[0] = 'new';
    log(`prepend(${val}) → 插入头部，原节点右移`, true);

  } else if (currentOp === 'insert') {
    nodes.splice(clampedPos, 0, val);
    phaseNodes[clampedPos] = 'new';
    log(`insert(${val}, pos=${clampedPos}) → 修改 prev.next 和 newNode.next`, true);

  } else if (currentOp === 'delete') {
    if (nodes.length === 0) { log('链表为空'); history.pop(); return; }
    const delIdx = Math.min(clampedPos, nodes.length-1);
    const delVal = nodes[delIdx];
    phaseNodes[delIdx] = 'del';
    draw();
    setTimeout(() => {
      nodes.splice(delIdx, 1);
      phaseNodes = {};
      updateLen();
      draw();
    }, 600);
    log(`delete(pos=${delIdx}) → 移除节点 ${delVal}，修改 prev.next`, true);

  } else if (currentOp === 'search') {
    let found = -1;
    for (let i = 0; i < nodes.length; i++) {
      phaseNodes[i] = 'visit';
      if (nodes[i] === val) { found = i; break; }
    }
    if (found >= 0) {
      phaseNodes[found] = 'found';
      log(`search(${val}) → 找到！idx=${found}，遍历 ${found+1} 步`, true);
    } else {
      log(`search(${val}) → 未找到，遍历整个链表`);
    }

  } else if (currentOp === 'reverse') {
    nodes.reverse();
    nodes.forEach((_,i) => { phaseNodes[i] = i < Math.ceil(nodes.length/2) ? 'new' : 'visit'; });
    log(`reverse() → 三指针法原地反转 O(n)`, true);
  }

  document.getElementById('s-step').textContent = OP_NAMES[currentOp];
  updateLen();
  draw();
}

// ─── Drawing ───
function resizeCanvas() {
  C.width = C.offsetWidth * devicePixelRatio;
  C.height = C.offsetHeight * devicePixelRatio;
  draw();
}

const NODE_W = 64;
const NODE_H = 44;
const ARROW_W = 32;
const UNIT = NODE_W + ARROW_W;

const COL_MAP = {
  default: '#8a857d',
  new: '#161513',
  del: '#9f1239',
  visit: '#6f614b',
  found: '#4f6f52',
};

function draw() {
  const w = C.width, h = C.height;
  ctx.clearRect(0, 0, w, h);
  const dpr = devicePixelRatio;
  const n = nodes.length;
  if (n === 0) {
    ctx.fillStyle = 'rgba(22,21,19,0.35)';
    ctx.font = `${13*dpr}px var(--mono)`;
    ctx.textAlign = 'center';
    ctx.fillText('空链表 (head → NULL)', w/2, h/2);
    return;
  }

  const totalW = n * NODE_W + (n-1) * ARROW_W;
  // Auto wrap rows if too wide
  const COLS = Math.min(n, Math.floor(w / (UNIT*dpr)));
  const ROWS = Math.ceil(n / COLS);
  const startX = (w - COLS * UNIT * dpr) / 2 + 4*dpr;
  const startY = (h - ROWS * (NODE_H + 40) * dpr) / 2;

  ctx.font = `bold ${10*dpr}px "Space Grotesk",sans-serif`;
  ctx.textAlign = 'center';

  nodes.forEach((val, idx) => {
    const row = Math.floor(idx / COLS);
    const col = idx % COLS;
    const x = startX + col * UNIT * dpr;
    const y = startY + row * (NODE_H + 40) * dpr;
    const isLast = (idx === n-1) || ((col+1)===COLS && idx < n-1);

    const color = COL_MAP[phaseNodes[idx]] || COL_MAP.default;

    // Shadow glow
    if (phaseNodes[idx]) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 12 * dpr;
    }

    // Node box (value)
    ctx.fillStyle = color;
    roundRect(ctx, x, y, NODE_W*dpr, NODE_H*dpr, 8*dpr);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Value text
    ctx.fillStyle = '#f8f4eb';
    ctx.fillText(String(val), x + NODE_W*dpr/2, y + NODE_H*dpr/2 + 4*dpr);

    // Next pointer box
    const nx = x + NODE_W*dpr;
    ctx.fillStyle = 'rgba(22,21,19,0.08)';
    roundRect(ctx, nx, y, ARROW_W*0.5*dpr, NODE_H*dpr, [0,4*dpr,4*dpr,0]);
    ctx.fill();
    ctx.fillStyle = 'rgba(22,21,19,0.42)';
    ctx.font = `${8*dpr}px "Space Grotesk",sans-serif`;
    ctx.fillText('*next', nx + ARROW_W*0.25*dpr, y + NODE_H*dpr/2 + 3*dpr);

    // Index label
    ctx.fillStyle = 'rgba(22,21,19,0.42)';
    ctx.font = `${8*dpr}px "Space Grotesk",sans-serif`;
    ctx.fillText(`[${idx}]`, x + NODE_W*dpr/2, y - 6*dpr);

    // HEAD label
    if (idx === 0) {
      ctx.fillStyle = '#161513';
      ctx.font = `bold ${9*dpr}px var(--mono)`;
      ctx.fillText('HEAD', x + NODE_W*dpr/2, y - 18*dpr);
    }

    // Arrow to next node
    if (idx < n - 1) {
      const isWrap = col + 1 >= COLS;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2 * dpr;
      ctx.setLineDash([]);
      if (!isWrap) {
        // Horizontal arrow
        arrow(ctx, nx + ARROW_W*0.5*dpr, y + NODE_H*dpr/2, x + UNIT*dpr, y + NODE_H*dpr/2, dpr);
      } else {
        // Wrap arrow down
        const nextRowX = startX;
        const nextRowY = startY + (row+1) * (NODE_H+40)*dpr;
        ctx.beginPath();
        ctx.moveTo(nx + ARROW_W*0.5*dpr, y + NODE_H*dpr/2);
        ctx.lineTo(nx + ARROW_W*0.7*dpr, y + NODE_H*dpr/2);
        ctx.lineTo(nx + ARROW_W*0.7*dpr, nextRowY + NODE_H*dpr/2);
        ctx.lineTo(nextRowX, nextRowY + NODE_H*dpr/2);
        ctx.stroke();
        // Arrowhead
        arrowHead(ctx, nextRowX, nextRowY + NODE_H*dpr/2, 'right', dpr);
      }
    } else {
      // NULL
      ctx.fillStyle = 'rgba(22,21,19,0.42)';
      ctx.font = `${9*dpr}px "Space Grotesk",sans-serif`;
      ctx.fillText('NULL', nx + ARROW_W*0.75*dpr, y + NODE_H*dpr/2 + 4*dpr);
    }

    ctx.font = `bold ${10*dpr}px "Space Grotesk",sans-serif`;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  if (typeof r === 'number') r = [r,r,r,r];
  ctx.moveTo(x+r[0], y);
  ctx.lineTo(x+w-r[1], y); ctx.arcTo(x+w,y,x+w,y+r[1],r[1]);
  ctx.lineTo(x+w,y+h-r[2]); ctx.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
  ctx.lineTo(x+r[3],y+h); ctx.arcTo(x,y+h,x,y+h-r[3],r[3]);
  ctx.lineTo(x,y+r[0]); ctx.arcTo(x,y,x+r[0],y,r[0]);
  ctx.closePath();
}

function arrow(ctx, x1, y1, x2, y2, dpr) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2 - 8*dpr, y2);
  ctx.stroke();
  arrowHead(ctx, x2, y2, 'right', dpr);
}

function arrowHead(ctx, x, y, dir, dpr) {
  const s = 7*dpr;
  ctx.beginPath();
  if (dir==='right') { ctx.moveTo(x,y); ctx.lineTo(x-s,y-s/2); ctx.lineTo(x-s,y+s/2); }
  ctx.closePath(); ctx.fill();
}

window.addEventListener('resize', resizeCanvas);
resetList();
setTimeout(resizeCanvas, 50);
</script>
</body>
</html>
